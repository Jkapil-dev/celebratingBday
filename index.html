<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="gradient-glow" aria-hidden="true"></div>
  <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>
  <div class="particles-layer" id="particlesLayer" aria-hidden="true"></div>
  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
  <div class="balloon-layer" id="balloonLayer" aria-hidden="true"></div>
  <div class="sparkle-layer" id="sparkleLayer" aria-hidden="true"></div>
  <div class="fade-overlay" id="fadeOverlay" aria-hidden="true"></div>

  <button class="sound-toggle" id="soundToggle" type="button" aria-label="Mute birthday music" aria-pressed="false">
    <span class="sound-icon" aria-hidden="true">♪</span>
  </button>

  <main class="app-shell">
    <section class="name-screen screen is-visible" id="nameScreen" aria-labelledby="nameTitle">
      <form class="name-card" id="nameForm" novalidate>
        <p class="eyebrow">Before we begin</p>
        <h1 id="nameTitle">Who is this for?</h1>
        <label class="sr-only" for="nameInput">Recipient name</label>
        <input class="name-input" id="nameInput" name="recipientName" type="text" placeholder="Enter name..." autocomplete="off" maxlength="28">
        <div class="date-fieldset" aria-labelledby="birthdayDateLabel">
          <p class="date-label" id="birthdayDateLabel">Select Birthday 🎂</p>
          <div class="date-controls">
            <label class="sr-only" for="monthSelect">Birthday month</label>
            <select class="date-select" id="monthSelect" name="birthdayMonth">
              <option value="">Month</option>
              <option value="1">Jan</option>
              <option value="2">Feb</option>
              <option value="3">Mar</option>
              <option value="4">Apr</option>
              <option value="5">May</option>
              <option value="6">Jun</option>
              <option value="7">Jul</option>
              <option value="8">Aug</option>
              <option value="9">Sep</option>
              <option value="10">Oct</option>
              <option value="11">Nov</option>
              <option value="12">Dec</option>
            </select>

            <label class="sr-only" for="daySelect">Birthday day</label>
            <select class="date-select" id="daySelect" name="birthdayDay">
              <option value="">Day</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
              <option value="31">31</option>
            </select>
          </div>
        </div>
        <p class="validation-message" id="nameError" aria-live="polite"></p>
        <button class="primary-button" type="submit">Continue <span aria-hidden="true">💖</span></button>
      </form>
    </section>

    <section class="landing screen" id="landingScreen" aria-labelledby="landingTitle">
      <p class="eyebrow">A tiny surprise</p>
      <h1 id="landingTitle">Hey <span id="friendName">Lovely</span> <span aria-hidden="true">💖</span></h1>
      <p class="subtext">Something special is waiting...</p>
      <p class="countdown-text">
        Counting down to your special day 🎉
        <span id="countdownTimer">00:00:00</span>
      </p>
      <button class="primary-button" id="startButton" type="button">Start Birthday <span aria-hidden="true">🎉</span></button>
    </section>

    <section class="celebration screen" id="celebrationScreen" aria-live="polite">
      <div class="cake-stage" id="cakeStage">
        <p class="celebration-kicker">Make a wish</p>
        <div class="cake" aria-label="Birthday cake with glowing candles" role="img">
          <div class="candles">
            <span class="candle"><i></i></span>
            <span class="candle"><i></i></span>
            <span class="candle"><i></i></span>
          </div>
          <div class="cake-top">
            <span class="sprinkle sprinkle-one"></span>
            <span class="sprinkle sprinkle-two"></span>
            <span class="sprinkle sprinkle-three"></span>
            <span class="sprinkle sprinkle-four"></span>
          </div>
          <div class="icing"></div>
          <div class="cake-body"></div>
          <div class="cake-plate"></div>
        </div>
      </div>

      <div class="message-card" id="messageCard">
        <p class="message-label">Happy Birthday</p>
        <h2 id="birthdayTitle">To a beautiful soul</h2>
        <p class="typed-message" id="typedMessage"></p>
        <div class="ending-ui" id="endingFlow">
          <p class="ending-quote" id="endingQuote">Hope this made you smile 💖</p>
          <div class="ending-question" id="endingQuestion">
            <p>You are happy na? 😊</p>
            <button class="secondary-button" id="yesButton" type="button">Yes 💖</button>
          </div>
          <p class="ending-response" id="endingResponse">That made it all worth it 💫</p>
        </div>
        <button class="secondary-button is-hidden" id="replayButton" type="button">Replay celebration</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
